# 讯飞：HTTP 各版本 APIPassword 不同；model 须与密钥所在控制台版本一致，否则易 11200 AppIdNoAuthError
llm:
  base_url: https://spark-api-open.xf-yun.com/v1
  default_model: lite
  temperature: 0.2
  max_tokens: 4096

models:
  baseline:
    - name: spark
      model: lite