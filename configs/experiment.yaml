# execution.case_timeout_sec: per-test subprocess timeout
execution:
  sandbox: subprocess
  case_timeout_sec: 15

tasks:
  task_file: data/raw/tasks.jsonl
  tasks_per_level: 3

annotation:
  kappa_threshold: 0.7
  rubric_levels: 3

strategies:
  C1: {}
  C2:
    max_rounds: 3
  C3:
    max_rounds: 3

analysis:
  significance_level: 0.05

# LLM: 与 default_model 一致——讯飞星火需 base_url；纯 OpenAI 可改为 gpt-4o 且 base_url: null
llm:
  base_url: https://spark-api-open.xf-yun.com/v1
  default_model: generalv3.5
  temperature: 0.2
  max_tokens: 4096

models:
  baseline:
    - name: spark
      model: generalv3.5
